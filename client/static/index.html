<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Multiplayer - WebSocket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background:
                radial-gradient(circle at top, rgba(99, 102, 241, 0.15), transparent 25%),
                radial-gradient(circle at right, rgba(16, 185, 129, 0.12), transparent 18%),
                linear-gradient(180deg, #0f172a 0%, #020617 100%);
        }

        .quiz-card {
            backdrop-filter: blur(18px);
            background-color: rgba(15, 23, 42, 0.88);
        }

        #roomLink a {
            color: #a5b4fc;
            word-break: break-all;
        }

        .option-btn.correct {
            border-color: #22c55e;
            background-color: rgba(34, 197, 94, 0.15);
        }

        .option-btn.wrong {
            border-color: #ef4444;
            background-color: rgba(239, 68, 68, 0.15);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-10 text-slate-100">
    <div class="quiz-card max-w-2xl w-full rounded-3xl border border-slate-700/60 p-8 shadow-[0_30px_80px_rgba(15,23,42,0.45)]">
        <div class="flex items-center justify-between gap-4 mb-6">
            <div>
                <h1 class="text-3xl font-semibold tracking-tight">Quiz Multiplayer</h1>
                <p class="text-sm text-slate-400 mt-1">Perguntas sobre Python em tempo real</p>
            </div>
            <div class="rounded-full bg-slate-800/90 px-3 py-1 text-xs uppercase tracking-[0.2em] text-slate-300">
                WebSocket
            </div>
        </div>

        <div id="status" class="mb-6 rounded-2xl border border-slate-700/70 bg-slate-900/80 px-4 py-3 text-center text-lg font-medium shadow-inner">
            Carregando...
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="rounded-2xl border border-slate-700/70 bg-slate-900/70 p-4">
                <h2 class="text-sm uppercase tracking-wider text-slate-400 mb-3">Informações da rodada</h2>
                <div id="questionMeta" class="text-sm text-slate-300">Aguardando início...</div>
            </div>

            <div class="rounded-2xl border border-slate-700/70 bg-slate-900/70 p-4">
                <h2 class="text-sm uppercase tracking-wider text-slate-400 mb-3">Placar</h2>
                <div id="scoreboard" class="text-sm text-slate-300 space-y-2">
                    <div>Jogador 1: 0</div>
                    <div>Jogador 2: 0</div>
                </div>
            </div>
        </div>

        <div id="quizArea" class="mb-6 hidden">
            <div class="rounded-2xl border border-slate-700/70 bg-slate-900/70 p-5 mb-4">
                <p id="questionText" class="text-lg font-medium leading-relaxed">Pergunta aparecerá aqui</p>
            </div>

            <div id="options" class="grid grid-cols-1 gap-3">
                <!-- opções geradas via JS -->
            </div>
        </div>

        <button id="createRoom" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-semibold px-5 py-3 rounded-2xl shadow-lg shadow-indigo-500/20 transition">
            Criar sala
        </button>

        <div id="roomLink" class="mt-4 text-sm text-slate-300 hidden"></div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
